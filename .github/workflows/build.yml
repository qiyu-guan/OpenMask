name: OpenMask Python Build
on: [push,pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4

      - name: 安装系统编译依赖
        run: |
          sudo apt update
          sudo apt install -y cmake gcc python3 python3-pip aapt zipalign apksigner unzip wget

      - name: 配置Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r27b-linux.zip
          unzip android-ndk-r27b-linux.zip
          echo "NDK=$PWD/android-ndk-r27b" >> $GITHUB_ENV

      - name: C源码CMake编译
        working-directory: ./core/src/main/cpp
        run: |
          cmake -DCMAKE_TOOLCHAIN_FILE=${{ env.NDK }}/build/cmake/android.toolchain.cmake -DANDROID_ABI=arm64-v8a .
          make -j4
          mkdir -p ../../build/tmp_apk

      - name: 启动Python编译
        run: python3 build.py

      - name: 打包产物上传
        uses: actions/upload-artifact@v4
        with:
          path: dist/out.apk
